<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | AltaVet</title>
    <link rel="stylesheet" href="/styles.css?v=20260717-professional-cards" />
    <link rel="stylesheet" href="/login.css?v=20260717-professional-cards" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel">
        <div class="brand login-brand">
          <span class="brand-mark">A</span>
          <span>AltaVet</span>
        </div>

        <form id="passwordStep" class="login-form">
          <p class="eyebrow">Acesso seguro</p>
          <h1>Entrar no sistema</h1>
          <label>
            Usuário
            <input id="username" autocomplete="username" required />
          </label>
          <label>
            Senha
            <input id="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">Continuar</button>
        </form>

        <form id="mfaStep" class="login-form hidden">
          <p class="eyebrow">Verificação em duas etapas</p>
          <h1 id="mfaTitle">Código MFA</h1>
          <div id="mfaSetup" class="mfa-setup hidden">
            <p>Escaneie este QR Code no Google Authenticator, Microsoft Authenticator, Authy ou aplicativo compatível.</p>
            <div class="qr-box" id="qrBox"></div>
            <label>
              Chave manual
              <input id="manualSecret" readonly />
            </label>
          </div>
          <label>
            Código do aplicativo
            <input id="mfaCode" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required />
          </label>
          <button class="primary-button" type="submit">Entrar</button>
          <button class="ghost-button" type="button" id="backToPassword">Voltar</button>
        </form>

        <p class="login-message" id="loginMessage" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="/login.js?v=20260717-professional-cards"></script>
  </body>
</html>
